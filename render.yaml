services:
  # 1. The Express Backend API (Web Service Server)
  - type: web
    name: lifevault-api
    env: node
    plan: free
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true

staticSites:
  # 2. The Vite React Frontend (Static CDN Site)
  - name: lifevault-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://lifevault-api.onrender.com